<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GoLab Dashboard</title>
    <style>
      :root {
        --bg: #050505;
        --panel: #111111;
        --panel-border: #2f2f2f;
        --text: #f5f5f5;
        --muted: #a7a7a7;
        --ok: #52d273;
        --warn: #ffcf5c;
        --bad: #ff7b7b;
        --bard-red: #c9232d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .shell {
        width: 100%;
        max-width: 1440px;
        margin: 0 auto;
        padding: 0 20px 40px;
      }

      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 18px 0;
        background: rgba(5, 5, 5, 0.95);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
        min-width: 0;
      }

      .header-left img {
        height: 48px;
        width: auto;
      }

      .header-title {
        margin: 0;
        font-size: 26px;
        line-height: 1.1;
      }

      .clock {
        white-space: nowrap;
        text-align: right;
        font-size: 17px;
        color: rgba(255, 255, 255, 0.86);
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px 24px;
        padding: 18px 0;
        color: var(--muted);
        font-size: 14px;
      }

      .summary strong {
        color: var(--text);
      }

      .node-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px;
      }

      .card {
        min-height: 168px;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .node-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .node-title {
        min-width: 0;
      }

      .node-name {
        overflow-wrap: anywhere;
        font-size: 18px;
        font-weight: 700;
        line-height: 1.2;
      }

      .node-location {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.3;
      }

      .status {
        flex: 0 0 auto;
        border-radius: 999px;
        border: 1px solid currentColor;
        padding: 4px 8px;
        font-size: 12px;
        font-weight: 800;
        line-height: 1;
        color: var(--ok);
      }

      .node-values {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }

      .metric-label {
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .metric-value {
        min-height: 34px;
        overflow-wrap: anywhere;
        font-size: 24px;
        font-weight: 750;
        line-height: 1.1;
      }

      .metric-unit {
        margin-left: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 500;
      }

      .last-seen {
        margin-top: 14px;
        color: var(--muted);
        font-size: 12px;
      }

      @media (max-width: 700px) {
        .shell {
          padding: 0 14px 28px;
        }

        .header {
          align-items: flex-start;
        }

        .header-left img {
          height: 40px;
        }

        .header-title {
          font-size: 22px;
        }

        .clock {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <div class="header-left">
          <img src="/static/Bard-Web-Logos/bard-logo-red.png" alt="Bard logo" />
          <h1 class="header-title">GoLab Monitor</h1>
        </div>
        <div class="clock" id="time">—</div>
      </div>

      <div class="summary">
        <div><strong>GoLab Dashboard</strong></div>
        <div>Outdoor temperature (Rhinebeck)</div>
      </div>

      <div class="node-grid">
        <article class="card">
          <div class="node-head">
            <div class="node-title">
              <div class="node-name">Rhinebeck Outdoor</div>
              <div class="node-location">GoLab Monitor</div>
            </div>
            <div class="status">OK</div>
          </div>
          <div class="node-values">
            <div>
              <div class="metric-label">Temp</div>
              <div class="metric-value"><span id="temp">—</span><span class="metric-unit">°C</span></div>
            </div>
          </div>
          <div class="last-seen">Live reading from GoLab data feed</div>
        </article>
      </div>
    </div>

    <script>
      const tempEl = document.getElementById("temp");
      const timeEl = document.getElementById("time");

      const ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.temperature !== null) {
          tempEl.textContent = data.temperature;
        }
      };

      function tick() {
        timeEl.textContent = new Date().toLocaleTimeString([], {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
